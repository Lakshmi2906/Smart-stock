version: '3.9'

services:

  # ── Spring Boot Backend ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartstock-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # ── Supabase DB ──────────────────────────────────────────────
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      # ── Razorpay ─────────────────────────────────────────────────
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      # ── JWT ──────────────────────────────────────────────────────
      JWT_SECRET: ${JWT_SECRET}
      # ── CORS ─────────────────────────────────────────────────────
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:80}
      # ── JVM tuning ───────────────────────────────────────────────
      JAVA_TOOL_OPTIONS: "-Xms256m -Xmx512m"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/products || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - smartstock-net

  # ── Nginx + Static Frontend ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartstock-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - smartstock-net

networks:
  smartstock-net:
    driver: bridge
