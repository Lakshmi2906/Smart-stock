# ── SERVER ────────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/

# ── DATASOURCE (Supabase PostgreSQL) ─────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://db.ppdvlnakuyfeanyivjtk.supabase.co:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:LakshmiSaravanan}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# ── JPA / HIBERNATE ───────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.open-in-view=false

# ── RAZORPAY (Test Mode) ──────────────────────────────────────────────
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_dummy_key_id}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:dummy_razorpay_secret_key}
razorpay.currency=INR
razorpay.company.name=SmartStock Enterprise

# ── JWT ───────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:ac2bfd3d-2d67-434e-abf5-7b4fb05c28b1}
jwt.expiration.ms=86400000

# ── OTP (In production, replace with Twilio/MSG91) ───────────────────
otp.expiry.minutes=10
otp.test.mode=${OTP_TEST_MODE:true}
otp.test.fixed=${OTP_FIXED:123456}

# ── CORS ──────────────────────────────────────────────────────────────
cors.allowed.origins=${CORS_ORIGINS:http://localhost:3000}

# ── SCHEDULER ─────────────────────────────────────────────────────────
lock.cleanup.cron=*/30 * * * * *

# ── LOGGING ───────────────────────────────────────────────────────────
logging.level.com.smartstock=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
